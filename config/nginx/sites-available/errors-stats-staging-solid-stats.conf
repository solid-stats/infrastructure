# errors-stats-staging-solid-stats.conf — nginx vhost for errors.stats-staging.solid-stats.ru
# Managed by: infrastructure repo (config/nginx/sites-available/)
# Applied by: scripts/bootstrap-obs-edge.sh (operator-run, not CI)
# Live file: /etc/nginx/sites-available/errors-stats-staging-solid-stats.conf (symlinked into sites-enabled)
#
# PLACEHOLDER: This vhost is cert-provisioned in Phase 14 for DNS + rate-limit reasons but has
# NO upstream. The GlitchTip ClusterIP upstream is wired in Phase 16 by re-running
# bootstrap-obs-edge.sh with the GlitchTip ClusterIP substituted in.
# Until then, all HTTPS requests return 503 Service Unavailable.

# HTTP: ACME challenge path + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name errors.stats-staging.solid-stats.ru;

    # ACME webroot for certbot — required for HTTP-01 cert issuance and renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: TLS termination — placeholder 503 until Phase 16 wires the GlitchTip upstream
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name errors.stats-staging.solid-stats.ru;

    ssl_certificate /etc/letsencrypt/live/errors.stats-staging.solid-stats.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/errors.stats-staging.solid-stats.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # No upstream wired — Phase 16 replaces this block with the GlitchTip reverse-proxy
    location / {
        return 503;
    }
}
