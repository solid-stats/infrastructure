# grafana-stats-staging-solid-stats.conf — nginx vhost for grafana.solid-stats.ru
# Managed by: infrastructure repo (config/nginx/sites-available/)
# Applied by: scripts/bootstrap-obs-edge.sh (operator-run, not CI)
# Live file: /etc/nginx/sites-available/grafana-stats-staging-solid-stats.conf (symlinked into sites-enabled)
#
# UPSTREAM NOTE: The ClusterIP token below is substituted by bootstrap-obs-edge.sh at install
# time via sed. Do NOT hard-code a real IP here and do NOT edit this file directly on the host —
# changes will be overwritten on re-bootstrap.
#   bootstrap discovers:  kubectl get svc grafana -n monitoring -o jsonpath='{.spec.clusterIP}:{.spec.ports[0].port}'
#   placeholder token:    UPSTREAM_PLACEHOLDER (replaced with e.g. 10.43.x.x:80 at run time)

upstream grafana_obs {
    server UPSTREAM_PLACEHOLDER;
    keepalive 16;
}

# HTTP: ACME challenge path + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name grafana.solid-stats.ru;

    # ACME webroot for certbot — do NOT proxy this to the upstream
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: TLS termination + WebSocket-capable proxy to Grafana ClusterIP upstream
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grafana.solid-stats.ru;

    ssl_certificate /etc/letsencrypt/live/grafana.solid-stats.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.solid-stats.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://grafana_obs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        # WebSocket upgrade headers — required for Grafana Live (dashboard streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
