apiVersion: v1
kind: ServiceAccount
metadata:
  name: replays-fetcher
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: replays-fetcher
    app.kubernetes.io/part-of: solid-stats
---
# Nightly FULL-CORPUS run-once sweep (08:00 MSK). Continuous page-1 ingest is now
# owned by the watch Deployment in 52-replays-fetcher-watch.yaml; this CronJob is the
# backstop that crawls to the true end-of-corpus and catches anything that fell off
# page 1. Name kept `replays-fetcher` on purpose: the shared SA above and the live
# secret `replays-fetcher-runtime` already use it, so a rename only churns kubectl diff.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: replays-fetcher
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: replays-fetcher
    app.kubernetes.io/part-of: solid-stats
spec:
  schedule: "0 8 * * *"
  timeZone: Europe/Moscow
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      # backoffLimit 30: F4 parity-run resilience tuning (was 1). Source of truth is
      # this manifest — do not revert without updating plans/product/PARITY-COORDINATION.md.
      backoffLimit: 30
      template:
        metadata:
          labels:
            app.kubernetes.io/name: replays-fetcher
            app.kubernetes.io/part-of: solid-stats
        spec:
          priorityClassName: app-critical  # PREP-03: evict after obs-background under node pressure
          serviceAccountName: replays-fetcher
          automountServiceAccountToken: false
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: replays-fetcher
              # Pinned to the watch-split image (master): adds the page-1 watch daemon
              # used by 52-replays-fetcher-watch.yaml; the run-once sweep path is unchanged.
              # Both workloads share this exact SHA so cron and watch stay version-locked.
              image: ghcr.io/solid-stats/replays-fetcher:6a500655a2c4db28a96ad67671589aaaa7034b03
              imagePullPolicy: IfNotPresent
              args: ["run-once"]
              env:
                - name: S3_ENDPOINT
                  value: https://s3.twcstorage.ru
                - name: S3_REGION
                  value: ru-1
                - name: S3_FORCE_PATH_STYLE
                  value: "true"
                # REPLAY_SOURCE_MAX_PAGES intentionally UNSET: the discovery loop
                # is unbounded by default and stops on end-of-corpus (run-once.ts
                # RANGE-01, stop-on-empty). The earlier `786` pin (23c94c2,
                # "for the full source corpus") matched the page count on
                # 2026-05-11 but went stale as sg.zone grew (786 -> 790 pages):
                # newest-first pagination pushes the oldest replays past the cap,
                # so the cap silently truncated the oldest ~120 replays and the run
                # still reported `complete`. Removed 2026-06-16 to crawl to the
                # true end-of-corpus and close the sg coverage gap.
                # F4 parity-run resilience tuning + F1 conditional-writes flag.
                # Source of truth is this manifest — see plans/product/PARITY-COORDINATION.md.
                # Order mirrors the live CronJob to keep `kubectl diff` clean.
                - name: REPLAY_SOURCE_RETRY_ATTEMPTS
                  value: "8"
                - name: REPLAY_SOURCE_REQUEST_SPACING_MS
                  value: "500"
                - name: REPLAY_SOURCE_CONCURRENCY
                  value: "2"
                - name: REPLAY_SOURCE_TIMEOUT_MS
                  value: "60000"
                - name: S3_CHECKPOINT_CONDITIONAL_WRITES
                  value: "false"
              envFrom:
                - secretRef:
                    name: replays-fetcher-runtime
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
