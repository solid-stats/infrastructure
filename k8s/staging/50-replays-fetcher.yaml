apiVersion: v1
kind: ServiceAccount
metadata:
  name: replays-fetcher
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: replays-fetcher
    app.kubernetes.io/part-of: solid-stats
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: replays-fetcher
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: replays-fetcher
    app.kubernetes.io/part-of: solid-stats
spec:
  schedule: "*/30 * * * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      # backoffLimit 30: F4 parity-run resilience tuning (was 1). Source of truth is
      # this manifest — do not revert without updating plans/product/PARITY-COORDINATION.md.
      backoffLimit: 30
      template:
        metadata:
          labels:
            app.kubernetes.io/name: replays-fetcher
            app.kubernetes.io/part-of: solid-stats
        spec:
          priorityClassName: app-critical  # PREP-03: evict after obs-background under node pressure
          serviceAccountName: replays-fetcher
          automountServiceAccountToken: false
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: replays-fetcher
              # F1 fix (conditional-writes) — pinned to the live-validated image. Do not
              # revert to 8395fbc… without updating plans/product/PARITY-COORDINATION.md.
              image: ghcr.io/solid-stats/replays-fetcher:7e5ca974053f814aaedb8698c427d85a6a43c723
              imagePullPolicy: IfNotPresent
              args: ["run-once"]
              env:
                - name: S3_ENDPOINT
                  value: https://s3.twcstorage.ru
                - name: S3_REGION
                  value: ru-1
                - name: S3_FORCE_PATH_STYLE
                  value: "true"
                - name: REPLAY_SOURCE_MAX_PAGES
                  value: "786"
                # F4 parity-run resilience tuning + F1 conditional-writes flag.
                # Source of truth is this manifest — see plans/product/PARITY-COORDINATION.md.
                # Order mirrors the live CronJob to keep `kubectl diff` clean.
                - name: REPLAY_SOURCE_RETRY_ATTEMPTS
                  value: "8"
                - name: REPLAY_SOURCE_REQUEST_SPACING_MS
                  value: "500"
                - name: REPLAY_SOURCE_CONCURRENCY
                  value: "2"
                - name: REPLAY_SOURCE_TIMEOUT_MS
                  value: "60000"
                - name: S3_CHECKPOINT_CONDITIONAL_WRITES
                  value: "false"
              envFrom:
                - secretRef:
                    name: replays-fetcher-runtime
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
