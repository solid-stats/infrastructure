# Operator-applied bootstrap manifest — DO NOT apply from CI.
# This file is applied ONCE by the operator: kubectl apply -f k8s/staging/01-obs-rbac.yaml
# CI (GitHub Actions) never applies this file. The deploy glob must exclude
# 01-obs-rbac.yaml so that each master-push deploy does not overwrite operator-managed RBAC.
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
---
apiVersion: v1
kind: Namespace
metadata:
  name: error-tracking
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: obs-ci-deployer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: obs-ci-deployer
    app.kubernetes.io/part-of: solid-stats
---
# k8s ≥1.24: token Secrets are NOT auto-generated for ServiceAccounts.
# The annotation below instructs the control plane to populate .data.token
# after the Secret is created. No token value is stored in git.
apiVersion: v1
kind: Secret
metadata:
  name: obs-ci-deployer-token
  namespace: monitoring
  annotations:
    kubernetes.io/service-account.name: obs-ci-deployer
  labels:
    app.kubernetes.io/name: obs-ci-deployer
    app.kubernetes.io/part-of: solid-stats
type: kubernetes.io/service-account-token
---
# Namespace-scoped Role — covers verbs needed for kubectl apply on obs workloads.
# No cluster-scoped resources, no destructive verbs, no cross-namespace access.
# Includes daemonsets for Grafana Alloy (Phase 15).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: obs-ci-deployer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: obs-ci-deployer
    app.kubernetes.io/part-of: solid-stats
rules:
  # Deployments, StatefulSets, DaemonSets: apply + rollout status
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # CronJobs: apply (rollout status not applicable)
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Pods: needed for kubectl rollout status --watch
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Core resources: apply
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch"]
  # ServiceAccounts in namespace (workload manifests may create them)
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "create", "update", "patch"]
  # NetworkPolicies: deploy NET-02 isolation manifests from CI (17-01)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: obs-ci-deployer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: obs-ci-deployer
    app.kubernetes.io/part-of: solid-stats
roleRef:
  kind: Role
  name: obs-ci-deployer
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: obs-ci-deployer
    namespace: monitoring
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: obs-ci-deployer
  namespace: error-tracking
  labels:
    app.kubernetes.io/name: obs-ci-deployer
    app.kubernetes.io/part-of: solid-stats
---
# k8s ≥1.24: token Secrets are NOT auto-generated for ServiceAccounts.
# The annotation below instructs the control plane to populate .data.token
# after the Secret is created. No token value is stored in git.
apiVersion: v1
kind: Secret
metadata:
  name: obs-ci-deployer-token
  namespace: error-tracking
  annotations:
    kubernetes.io/service-account.name: obs-ci-deployer
  labels:
    app.kubernetes.io/name: obs-ci-deployer
    app.kubernetes.io/part-of: solid-stats
type: kubernetes.io/service-account-token
---
# Namespace-scoped Role — covers verbs needed for kubectl apply on obs workloads.
# No cluster-scoped resources, no destructive verbs, no cross-namespace access.
# Includes daemonsets for Grafana Alloy (Phase 15).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: obs-ci-deployer
  namespace: error-tracking
  labels:
    app.kubernetes.io/name: obs-ci-deployer
    app.kubernetes.io/part-of: solid-stats
rules:
  # Deployments, StatefulSets, DaemonSets: apply + rollout status
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # CronJobs + Jobs: apply and wait for completion.
  # Jobs (batch/jobs) are required for kubectl apply of the glitchtip-migrate and
  # glitchtip-seed Jobs (92-93 manifests) and for kubectl wait --for=condition=complete
  # job/glitchtip-migrate in CI (16-02 RBAC gap — operator-bootstrap action).
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Pods: needed for kubectl rollout status --watch
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Core resources: apply
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch"]
  # ServiceAccounts in namespace (workload manifests may create them)
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "create", "update", "patch"]
  # NetworkPolicies: deploy NET-02 isolation manifests from CI (17-01)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: obs-ci-deployer
  namespace: error-tracking
  labels:
    app.kubernetes.io/name: obs-ci-deployer
    app.kubernetes.io/part-of: solid-stats
roleRef:
  kind: Role
  name: obs-ci-deployer
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: obs-ci-deployer
    namespace: error-tracking
---
# ---------------------------------------------------------------------------
# Prometheus runtime RBAC — operator-applied, NOT from CI.
# obs-ci-deployer is namespace-scoped and cannot create ClusterRole/
# ClusterRoleBinding. This block is applied once by the operator alongside the
# rest of this file. The Prometheus Deployment (10-prometheus.yaml) references
# serviceAccountName: prometheus, which binds to this pre-created SA + ClusterRole.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: solid-stats
---
# Read-only ClusterRole for Prometheus kubernetes_sd and node metrics scraping.
# Verbs limited to get/list/watch on node + workload resources only.
# No write verbs. T-13-12 mitigation: read-only; never widened from CI.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: solid-stats
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: solid-stats
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-monitoring
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
---
