apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: solid-stats
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: solid-stats
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: solid-stats
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: solid-stats
    spec:
      serviceAccountName: postgres
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 70
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: solid_stats
            - name: POSTGRES_USER
              value: solid
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "solid", "-d", "solid_stats"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "solid", "-d", "solid_stats"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
