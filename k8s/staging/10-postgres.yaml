apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: solid-stats
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: solid-stats
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: solid-stats
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: solid-stats
    spec:
      priorityClassName: app-critical  # PREP-03: evict after obs-background under node pressure
      serviceAccountName: postgres
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: solid_stats
            - name: POSTGRES_USER
              value: solid
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "solid", "-d", "solid_stats"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "solid", "-d", "solid_stats"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            # PREP-04: Guaranteed QoS — requests == limits on all containers.
            # ASSUMED values (A1 from 12-RESEARCH.md) — Plan 05 MUST confirm against
            # live `kubectl top pods` P95 before rollout. Limits MUST be >= P95 to
            # avoid CFS throttle (Pitfall 1) or OOM (Pitfall 1/3).
            requests:
              cpu: 500m    # raised from 250m; ASSUMED — verify vs live P95
              memory: 1Gi  # raised from 512Mi; ASSUMED — verify vs live P95
            limits:
              cpu: 500m    # lowered from "1"; ASSUMED — MUST be >= observed P95
              memory: 1Gi  # lowered from 2Gi; ASSUMED — MUST be >= observed P95
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
