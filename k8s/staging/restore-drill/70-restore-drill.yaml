# Restore drill Job — on-demand only.
# DRILL-04: stored in k8s/staging/restore-drill/ subdirectory so the CD apply glob
# (find k8s/staging -maxdepth 1 -name '*.yaml') never matches this file.
# Trigger via: scripts/restore-drill.sh
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restore-drill
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: restore-drill
    app.kubernetes.io/part-of: solid-stats
---
apiVersion: batch/v1
kind: Job
metadata:
  name: restore-drill
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: restore-drill
    app.kubernetes.io/part-of: solid-stats
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: restore-drill
        app.kubernetes.io/part-of: solid-stats
    spec:
      restartPolicy: Never
      serviceAccountName: restore-drill
      automountServiceAccountToken: false
      # fsGroup makes the emptyDir group-writable by gid 70 so the non-root main
      # container can read files written by the root initContainer.
      # runAsUser/runAsGroup/runAsNonRoot are intentionally absent at pod level —
      # they are set per-container so the initContainer can run as root (apk add
      # requires root) while the main container runs as non-root (pg_ctl/initdb
      # refuse root). uid/gid 70 is the real "postgres" user in postgres:17-alpine —
      # initdb does getpwuid() and refuses a uid with no /etc/passwd entry, so an
      # arbitrary uid like 999 fails ("could not look up effective user ID 999").
      securityContext:
        fsGroup: 70
      initContainers:
        - name: fetch-backup
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          # Root is required here: `apk add` writes to /var/lib/apk, /etc/apk, /var/log/apk
          # which are owned by root and cannot be written by the non-root main uid (exitCode 99 on live run).
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: scratch
              mountPath: /scratch
          env:
            - name: S3_ENDPOINT
              value: https://s3.twcstorage.ru
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: server-2-runtime
                  key: S3_BUCKET
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: server-2-runtime
                  key: S3_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: server-2-runtime
                  key: S3_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: ru-1
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
            - name: BACKUP_PREFIX
              value: backups/postgres
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache aws-cli

              export AWS_CONFIG_FILE=/scratch/aws-config
              aws configure set default.s3.addressing_style path

              # Discover latest backup (lexicographic max of directory entries).
              backup_id=$(aws --endpoint-url="$S3_ENDPOINT" \
                s3 ls "s3://${S3_BUCKET}/${BACKUP_PREFIX}/" \
                | awk '{print $NF}' | sed 's|/$||' | sort -r | head -1)
              if [ -z "$backup_id" ]; then echo "ERROR: no backups found in s3://${S3_BUCKET}/${BACKUP_PREFIX}/"; exit 1; fi

              # Require manifest.json to confirm backup is complete.
              if ! aws --endpoint-url="$S3_ENDPOINT" s3 ls \
                  "s3://${S3_BUCKET}/${BACKUP_PREFIX}/${backup_id}/manifest.json" >/dev/null 2>&1; then
                echo "ERROR: manifest.json missing for backup_id=${backup_id}"; exit 1; fi
              echo "backup_id=${backup_id}"

              # Download dump and associated files to shared scratch volume.
              aws --endpoint-url="$S3_ENDPOINT" \
                s3 cp "s3://${S3_BUCKET}/${BACKUP_PREFIX}/${backup_id}/solid_stats.dump" \
                /scratch/solid_stats.dump --only-show-errors
              aws --endpoint-url="$S3_ENDPOINT" \
                s3 cp "s3://${S3_BUCKET}/${BACKUP_PREFIX}/${backup_id}/solid_stats.dump.list" \
                /scratch/solid_stats.dump.list --only-show-errors
              aws --endpoint-url="$S3_ENDPOINT" \
                s3 cp "s3://${S3_BUCKET}/${BACKUP_PREFIX}/${backup_id}/manifest.json" \
                /scratch/manifest.json --only-show-errors

              # Make files readable by the non-root main container (uid 70, gid 70 = postgres).
              chmod 0644 /scratch/solid_stats.dump /scratch/solid_stats.dump.list /scratch/manifest.json
              echo "fetch-backup: files ready in /scratch"

      containers:
        - name: restore-drill
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            runAsUser: 70
            runAsGroup: 70
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # readOnlyRootFilesystem is NOT viable here — pg_ctl writes to the
            # rootfs; scratch DB writes go under /scratch.
          volumeMounts:
            - name: scratch
              mountPath: /scratch
          command:
            - /bin/sh
            - -ec
            - |
              # Step 1 — set local postgres env (NEVER accept these from pod env)
              PGHOST=localhost
              PGPORT=5432
              PGUSER=postgres

              # Step 2 — DRILL-01 safety barrier — refuse if any injected host points off-localhost.
              _injected_host="${POSTGRES_HOST:-${PGHOST:-localhost}}"
              if [ "$_injected_host" != "localhost" ] && [ "$_injected_host" != "127.0.0.1" ]; then
                echo "FATAL: injected DB host '$_injected_host' is not localhost (live Service name is 'postgres') — refusing drill to protect live data (DRILL-01)" >&2
                exit 1
              fi
              # Force every libpq client in this script to localhost regardless of inherited env.
              export PGHOST=localhost PGPORT=5432 PGUSER=postgres

              # Step 3 — initialize and start scratch postgres.
              # Trust auth: this is a throwaway scratch instance on a localhost-only
              # emptyDir, never exposed and never holding the live credential. No
              # password is set or needed; clients connect over localhost with -A trust.
              initdb_dir=/scratch/pgdata
              pg_ctl initdb -D "$initdb_dir" -o "-A trust"
              pg_ctl -D "$initdb_dir" -l /scratch/postgres.log start
              # WR-03 — cold initdb + first start on a constrained pod can exceed 30s.
              # Wait up to 60s and dump the postgres log on timeout so the operator can
              # tell a slow/failed startup apart from a real backup defect.
              i=0; while [ $i -lt 60 ]; do
                if pg_isready -h localhost -p 5432 -U postgres >/dev/null 2>&1; then
                  echo "scratch postgres ready"; break; fi
                i=$((i+1)); sleep 1
              done
              if ! pg_isready -h localhost -p 5432 -U postgres >/dev/null 2>&1; then
                echo "ERROR: scratch postgres did not start"; cat /scratch/postgres.log >&2 || true; exit 1; fi

              # WR-01 — teardown in an EXIT trap so it ALWAYS runs (even if an
              # assertion command exits non-zero under `sh -e` and aborts the script).
              # The trap never masks the result: Step 7 exits with $drill_result.
              cleanup() {
                dropdb -h localhost -U postgres solid_stats_drill 2>/dev/null || true
                pg_ctl -D "$initdb_dir" stop 2>/dev/null || true
                rm -rf /scratch/pgdata /scratch/solid_stats.dump /scratch/solid_stats.dump.list \
                       /scratch/manifest.json /scratch/aws-config 2>/dev/null || true
              }
              trap cleanup EXIT

              # Step 4 — create guarded scratch database and restore from pre-fetched dump.
              # The dump was downloaded by the fetch-backup initContainer; no S3 access here.
              createdb -h localhost -U postgres solid_stats_drill
              # WR-02 — capture pg_restore rc instead of discarding it. Custom-format
              # dumps can emit non-fatal warnings, so do not hard-fail on rc alone;
              # the downstream numeric assertions are the authoritative gate.
              if ! pg_restore --host=localhost --username=postgres \
                   --dbname=solid_stats_drill --no-owner --no-privileges \
                   /scratch/solid_stats.dump; then
                echo "WARN: pg_restore exited non-zero (continuing to assertions)"; fi

              # Step 5 — sanity assertions with captured result code.
              # CR-03 — every numeric value is validated as a real integer BEFORE the
              # `-lt` comparison. An empty/non-numeric value (psql error, connection
              # loss) is a FAILED assertion, never a silently-skipped one — a query
              # error must never yield a false PASS.
              drill_result=0
              drill_start=$(date +%s)

              # Infer backup_id from manifest written by initContainer.
              backup_id="unknown"
              if [ -f /scratch/manifest.json ]; then
                backup_id=$(grep -o '"backup_id"[[:space:]]*:[[:space:]]*"[^"]*"' /scratch/manifest.json \
                  | sed 's/.*"backup_id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/') || backup_id="unknown"
              fi

              table_count=$(psql -h localhost -U postgres -d solid_stats_drill -t -A \
                -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';")
              case "$table_count" in
                ''|*[!0-9]*)
                  echo "FAIL: table_count query returned non-numeric '${table_count}'"; drill_result=1; table_count=0;;
                *)
                  if [ "$table_count" -lt 5 ]; then
                    echo "FAIL: table_count=${table_count} (expected >= 5)"; drill_result=1; fi;;
              esac

              row_count=$(psql -h localhost -U postgres -d solid_stats_drill -t -A \
                -c "SELECT COALESCE(SUM(n_live_tup), 0) FROM pg_stat_user_tables;")
              case "$row_count" in
                ''|*[!0-9]*)
                  echo "FAIL: total_rows query returned non-numeric '${row_count}'"; drill_result=1; row_count=0;;
                *)
                  if [ "$row_count" -lt 1 ]; then
                    echo "FAIL: total_rows=${row_count} (expected > 0)"; drill_result=1; fi;;
              esac

              list_lines=$(wc -l < /scratch/solid_stats.dump.list | tr -d ' ')
              case "$list_lines" in
                ''|*[!0-9]*)
                  echo "FAIL: dump list line count non-numeric '${list_lines}'"; drill_result=1; list_lines=0;;
                *)
                  if [ "$list_lines" -lt 1 ]; then
                    echo "FAIL: dump list is empty"; drill_result=1; fi;;
              esac

              drill_end=$(date +%s)
              drill_duration=$((drill_end - drill_start))
              if [ $drill_result -eq 0 ]; then
                echo "DRILL_RESULT=PASS backup_id=${backup_id} table_count=${table_count} total_rows=${row_count} duration_s=${drill_duration}"
              else
                echo "DRILL_RESULT=FAIL backup_id=${backup_id} table_count=${table_count} total_rows=${row_count} duration_s=${drill_duration}"
              fi

              # Step 6 — teardown runs via the EXIT trap (WR-01); see cleanup() above.
              # Step 7 — exit with captured result
              exit $drill_result
          env:
            # No POSTGRES_PASSWORD and no S3 credentials here by design:
            # - the scratch DB uses trust auth (Step 3) and never touches postgres-auth secret.
            # - S3 download was handled by the fetch-backup initContainer; dump is at /scratch.
            - name: S3_ENDPOINT
              value: https://s3.twcstorage.ru
      volumes:
        - name: scratch
          emptyDir: {}
