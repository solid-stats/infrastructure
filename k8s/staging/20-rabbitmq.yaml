apiVersion: v1
kind: ServiceAccount
metadata:
  name: rabbitmq
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: solid-stats
---
# ConfigMap: rabbitmq enabled_plugins
# Value must be an Erlang term list ending with a period (Pitfall 5).
# Enables management (pre-existing) + native prometheus plugin (MET-04).
# Mounted into the rabbitmq container at /etc/rabbitmq/enabled_plugins via subPath.
# NOTE: applying this manifest triggers a rolling restart of rabbitmq-0 (~30s AMQP
# downtime, acceptable for staging). Apply is operator-gated in plan 13-06.
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-enabled-plugins
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: solid-stats
data:
  enabled_plugins: |
    [rabbitmq_management,rabbitmq_prometheus].
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: solid-stats
spec:
  # ClusterIP only — port 15692 not exposed externally (T-13-13).
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
    - name: prometheus
      port: 15692
      targetPort: prometheus
  selector:
    app.kubernetes.io/name: rabbitmq
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: solid-stats
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/part-of: solid-stats
    spec:
      priorityClassName: app-critical  # PREP-03: evict after obs-background under node pressure
      serviceAccountName: rabbitmq
      automountServiceAccountToken: false
      initContainers:
        - name: repair-erlang-cookie-permissions
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              if [ -f /var/lib/rabbitmq/.erlang.cookie ]; then
                chown 999:999 /var/lib/rabbitmq/.erlang.cookie
                chmod 600 /var/lib/rabbitmq/.erlang.cookie
              fi
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: rabbitmq
          image: rabbitmq:4-management
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
            - name: prometheus
              containerPort: 15692
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: solid
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-auth
                  key: RABBITMQ_PASSWORD
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
            - name: enabled-plugins
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
      volumes:
        - name: enabled-plugins
          configMap:
            name: rabbitmq-enabled-plugins
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
