apiVersion: v1
kind: ServiceAccount
metadata:
  name: server-2
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: server-2
    app.kubernetes.io/part-of: solid-stats
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-2
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: server-2
    app.kubernetes.io/part-of: solid-stats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: server-2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: server-2
        app.kubernetes.io/part-of: solid-stats
    spec:
      priorityClassName: app-critical  # PREP-03: evict after obs-background under node pressure
      serviceAccountName: server-2
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done
          resources:
            # PREP-04: initContainers must have requests==limits for Guaranteed QoS pod class.
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 10m
              memory: 16Mi
        - name: wait-for-rabbitmq
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z rabbitmq 5672; do sleep 2; done
          resources:
            # PREP-04: initContainers must have requests==limits for Guaranteed QoS pod class.
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: server-2
          image: ghcr.io/solid-stats/server-2:161b84869a484140035bd5148f55947e688d58ac
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: server-2-config
            - secretRef:
                name: server-2-runtime
          env:
            # Pin V8 old-space to ~75% of the 1Gi limit. The ingest parse-result
            # consumer loads a full OCAP artifact into heap per message at
            # PREFETCH_COUNT=10 (+ per-result recalc); the prior 512Mi pod (no
            # heap cap) OOM'd on the F5 reconciler's orphan-recovery burst
            # (2026-06-16). Deterministic cap + the 1Gi limit below give headroom.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            # PREP-04: Guaranteed QoS — requests == limits on all containers.
            # Memory raised 512Mi -> 1Gi (2026-06-16): the 512Mi pod OOM'd
            # (V8 heap-limit, ~255MB) when the F5 reconciler re-queued the orphan
            # backlog and the parse-result consumer loaded ~PREFETCH_COUNT=10 full
            # OCAP artifacts into heap concurrently (+ per-result recalc). Paired
            # with NODE_OPTIONS=--max-old-space-size=768 above. CPU left at 250m
            # (not the OOM driver). Re-confirm vs live `kubectl top pods` P95.
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 250m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
