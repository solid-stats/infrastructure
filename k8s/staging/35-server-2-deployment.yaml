apiVersion: v1
kind: ServiceAccount
metadata:
  name: server-2
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: server-2
    app.kubernetes.io/part-of: solid-stats
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-2
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: server-2
    app.kubernetes.io/part-of: solid-stats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: server-2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: server-2
        app.kubernetes.io/part-of: solid-stats
    spec:
      serviceAccountName: server-2
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done
        - name: wait-for-rabbitmq
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z rabbitmq 5672; do sleep 2; done
      containers:
        - name: server-2
          image: ghcr.io/solid-stats/server-2:3866f6b422c506a429e12658aaaedb0dd5c16b8e
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: server-2-config
            - secretRef:
                name: server-2-runtime
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
