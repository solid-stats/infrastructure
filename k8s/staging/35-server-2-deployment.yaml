apiVersion: v1
kind: ServiceAccount
metadata:
  name: server-2
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: server-2
    app.kubernetes.io/part-of: solid-stats
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-2
  namespace: solid-stats-staging
  labels:
    app.kubernetes.io/name: server-2
    app.kubernetes.io/part-of: solid-stats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: server-2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: server-2
        app.kubernetes.io/part-of: solid-stats
    spec:
      priorityClassName: app-critical  # PREP-03: evict after obs-background under node pressure
      serviceAccountName: server-2
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done
          resources:
            # PREP-04: initContainers must have requests==limits for Guaranteed QoS pod class.
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 10m
              memory: 16Mi
        - name: wait-for-rabbitmq
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z rabbitmq 5672; do sleep 2; done
          resources:
            # PREP-04: initContainers must have requests==limits for Guaranteed QoS pod class.
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: server-2
          image: ghcr.io/solid-stats/server-2:e31b1297c9b81b32b5d362a45295711922f4b9bf
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: server-2-config
            - secretRef:
                name: server-2-runtime
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            # PREP-04: Guaranteed QoS — requests == limits on all containers.
            # ASSUMED values (A2 from 12-RESEARCH.md) — Plan 05 MUST confirm against
            # live `kubectl top pods` P95 before rollout. Limits MUST be >= P95 to
            # avoid CFS throttle (Pitfall 1) or OOM.
            requests:
              cpu: 250m    # raised from 100m; ASSUMED — verify vs live P95
              memory: 512Mi  # raised from 256Mi; ASSUMED — verify vs live P95
            limits:
              cpu: 250m    # lowered from "1"; ASSUMED — MUST be >= observed P95
              memory: 512Mi  # lowered from 1Gi; ASSUMED — MUST be >= observed P95
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
