---
# Source: prometheus/templates/cm.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/version: v3.12.0
    helm.sh/chart: prometheus-29.11.0
    app.kubernetes.io/part-of: prometheus
  name: prometheus-server
  namespace: monitoring
data:
  allow-snippet-annotations: "false"
  alerting_rules.yml: |
    {}
  alerts: |
    {}
  prometheus.yml: |
    global:
      evaluation_interval: 30s
      scrape_interval: 30s
      scrape_timeout: 10s
    scrape_configs:
    - job_name: alloy
      static_configs:
      - targets:
        - alloy.monitoring.svc:12345
    - job_name: kube-state-metrics
      static_configs:
      - targets:
        - kube-state-metrics.monitoring.svc:8080
    - job_name: loki
      static_configs:
      - targets:
        - loki.monitoring.svc:3100
    - job_name: node-exporter
      static_configs:
      - targets:
        - node-exporter.monitoring.svc:9100
    - job_name: postgres-exporter
      static_configs:
      - targets:
        - postgres-exporter.monitoring.svc:9187
    - job_name: prometheus
      static_configs:
      - targets:
        - localhost:9090
    - job_name: rabbitmq
      static_configs:
      - targets:
        - rabbitmq.solid-stats-staging.svc:15692
    rule_files:
    - /etc/config/recording_rules.yml
    - /etc/config/alerting_rules.yml
    - /etc/config/rules
    - /etc/config/alerts
  recording_rules.yml: |
    {}
  rules: |
    {}
