# ---------------------------------------------------------------
# monitoring namespace — NetworkPolicies (NET-02)
# Applied via deploy-observability.yml (obs-ci-deployer, obs-k3s-staging context).
# Default-deny ingress + egress on all pods, then additive minimal-allow layers.
#
# NOTE: node-exporter runs hostNetwork=true (see 30-node-exporter.yaml).
# Its scrape path is host-network traffic and bypasses CNI netpol entirely.
# No NetworkPolicy rule is required for node-exporter scrape.
#
# Live-resolved values (17-03 NET-01 probe), substituted below:
#   host-edge ingress source = 10.42.0.1/32 (cni0 gateway — the SNAT source a node/
#     host process shows to a pod; NOT the node public IP). See Policy 4.
#   k8s API server = 10.43.0.1:443 (KUBERNETES_SERVICE_HOST). See Policy 11.
#   node-exporter scrape target = node IP 89.223.124.200:9100 (hostNetwork). See Policy 7.
# ---------------------------------------------------------------

# Policy 1: Allow DNS egress (must come first — never shadow by a deny).
# All pods in monitoring need DNS to coredns in kube-system.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Policy 2: Default deny all ingress traffic.
# Additive allow-* policies below open specific ingress flows.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Policy 3: Default deny all egress traffic.
# allow-dns-egress (above) and specific allow-* policies open needed egress flows.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# Policy 4: Allow Grafana ingress on :3000.
# Sources:
#   (a) ipBlock 10.42.0.1/32 — host nginx on the node proxies grafana.solid-stats.ru
#       to the grafana ClusterIP; the source the pod sees is the cni0 gateway (A1/A2).
#   (b) podSelector {} intra-ns — any monitoring pod (future kubectl port-forward,
#       Prometheus alert manager, etc.).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    # (a) Host nginx edge. A1/A2 (17-03 NET-01 probe): a node/host process reaching a
    #     pod is SNAT'd to the cni0 gateway 10.42.0.1, NOT the node public IP. (Host/
    #     local traffic also bypasses kube-router ingress netpol entirely, so the edge
    #     survives regardless — this ipBlock is the explicit, measured allow.)
    - from:
        - ipBlock:
            cidr: 10.42.0.1/32
      ports:
        - port: 3000
          protocol: TCP
    # (b) Intra-namespace pods (grafana←prometheus, port-forward, etc.)
    - from:
        - podSelector: {}
      ports:
        - port: 3000
          protocol: TCP
---
# Policy 5: Allow Grafana egress to its datasources (Prometheus + Loki).
# Both are intra-namespace podSelector rules.
# Prometheus service port is :80 (ClusterIP) and direct :9090.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 80
          protocol: TCP
        - port: 9090
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
      ports:
        - port: 3100
          protocol: TCP
---
# Policy 6: Allow Prometheus ingress on :9090 and :80.
# Grafana and other intra-ns pods query Prometheus via these ports.
# podSelector matches prometheus-server pod (component=server).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/component: server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 9090
          protocol: TCP
        - port: 80
          protocol: TCP
---
# Policy 7: Allow Prometheus scrape egress.
# Intra-namespace targets: kube-state-metrics :8080, node-exporter svc :9100
# (note: actual node-exporter scrape is host-network traffic that bypasses netpol;
# the :9100 rule is a no-op in practice but present for clarity), postgres-exporter
# :9187, loki :3100, alloy :12345.
# Cross-namespace: rabbitmq :15692 in solid-stats-staging.
# postgres :5432 is NOT scraped by prometheus directly; postgres-exporter connects
# out (see allow-postgres-exporter-egress below).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/component: server
  policyTypes:
    - Egress
  egress:
    # Intra-monitoring scrape targets
    - to:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
        - port: 9100
          protocol: TCP
        - port: 9187
          protocol: TCP
        - port: 3100
          protocol: TCP
        - port: 12345
          protocol: TCP
    # node-exporter runs hostNetwork, so its Service endpoint is the node's own IP
    # (89.223.124.200), NOT a pod-CIDR IP — the podSelector{} rule above cannot match it.
    # Prometheus scrapes node-exporter.monitoring.svc:9100 -> node IP:9100, so allow that
    # host-IP egress explicitly (17-03 finding).
    - to:
        - ipBlock:
            cidr: 89.223.124.200/32
      ports:
        - port: 9100
          protocol: TCP
    # Cross-namespace: rabbitmq metrics in solid-stats-staging
    # namespaceSelector + podSelector must both match for AND semantics.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: solid-stats-staging
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rabbitmq
      ports:
        - port: 15692
          protocol: TCP
---
# Policy 8: Allow postgres-exporter egress to postgres in solid-stats-staging.
# The exporter pod connects directly to postgres :5432 (not prometheus).
# podSelector matches app.kubernetes.io/name=prometheus-postgres-exporter (A4).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-exporter-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus-postgres-exporter
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: solid-stats-staging
      ports:
        - port: 5432
          protocol: TCP
---
# Policy 9: Allow Loki ingress on :3100 (write) and :9095 (gRPC / prometheus scrape).
# Alloy pushes logs on :3100; Prometheus scrapes Loki metrics on :3100/:9095.
# Both are intra-namespace — podSelector {} covers alloy and prometheus pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-loki-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 3100
          protocol: TCP
        - port: 9095
          protocol: TCP
---
# Policy 10: Allow Alloy egress to Loki (intra-ns).
# Alloy's k8s-API egress (discovery.kubernetes + loki.source.kubernetes log tailing)
# is covered by the shared allow-apiserver-egress policy below (Policy 11).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alloy-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alloy
  policyTypes:
    - Egress
  egress:
    # Loki write endpoint (intra-ns)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
      ports:
        - port: 3100
          protocol: TCP
---
# Policy 11: Allow egress to the Kubernetes API server (kubernetes.default.svc,
# ClusterIP 10.43.0.1:443 — A3 confirmed live in 17-03: alloy's KUBERNETES_SERVICE_HOST
# is 10.43.0.1). Several monitoring pods need the API under default-deny-egress:
#   - kube-state-metrics  (watches cluster objects — its entire function)
#   - grafana             (sc-dashboard / sc-datasource sidecars watch ConfigMaps)
#   - alloy               (discovery.kubernetes + loki.source.kubernetes log tailing)
# prometheus (static_configs), loki, node-exporter, postgres-exporter do NOT need it,
# but a namespace-wide podSelector{} allow to the API server is the standard pattern and
# is not a lateral-movement risk (RBAC governs what each ServiceAccount may read).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solid-stats
    solid-stats.io/environment: staging
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # kube-router enforces egress AFTER kube-proxy DNAT, so allowing only the
    # kubernetes.default ClusterIP (10.43.0.1:443) is NOT enough — the post-DNAT
    # destination is the real apiserver endpoint, the node IP :6443 (verified live,
    # `kubectl get endpoints kubernetes`). Without the node-IP:6443 rule, any pod that
    # opens a FRESH API connection after this policy is applied (e.g. a restarted
    # grafana dashboard sidecar, kube-state-metrics, alloy) gets Connection refused.
    # Two SEPARATE entries (not one cross-product): a single `to`+`ports` block would
    # allow every peer×port combo, which would also open 89.223.124.200:443 — the host
    # nginx public edge — and the no-op 10.43.0.1:6443. Keep each {peer,port} exact:
    #   ClusterIP :443  (CNIs that match pre-DNAT)
    #   node IP   :6443 (kube-router, post-DNAT apiserver endpoint)
    - to:
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - port: 443
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 89.223.124.200/32
      ports:
        - port: 6443
          protocol: TCP
