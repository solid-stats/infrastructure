# Prometheus server values for prometheus-community/prometheus chart v29.11.0
# Rendered with: helm template prometheus prometheus-community/prometheus \
#   --version 29.11.0 --namespace monitoring \
#   --values k8s/observability/values/prometheus-values.yaml \
#   > k8s/observability/10-prometheus.yaml
#
# No secret values in this file (T-13-06 / validate-obs-manifests.py gate).

# Disable sub-charts — deployed separately for tighter control.
alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

# Chart v29.11.0: pushgateway subchart key is prometheus-pushgateway.
prometheus-pushgateway:
  enabled: false

# Do not create ClusterRole/ClusterRoleBinding — Prometheus runtime SA ClusterRole
# is added to k8s/staging/01-obs-rbac.yaml (operator-applied bootstrap, Pitfall 2).
rbac:
  create: false

# Use the pre-created prometheus SA (ClusterRole defined in 01-obs-rbac.yaml,
# operator-applied; obs-ci-deployer cannot create ClusterRole).
# A8: serviceAccounts.server.create=false / serviceAccounts.server.name=prometheus
serviceAccounts:
  server:
    create: false
    name: prometheus

server:
  # Global scrape interval: 30s (sufficient for all 4 targets; see A9).
  global:
    scrape_interval: 30s
    evaluation_interval: 30s

  # Retention: 15d time-based + 5GB size-based safety cap (MET-01).
  retention: "15d"
  retentionSize: "5GB"

  # PVC: 8Gi on k3s default local-path StorageClass.
  # With ~50k series at 30s scrape → ~4.3 GB; 8Gi leaves ~3.7 GB slack.
  persistentVolume:
    enabled: true
    size: 8Gi
    storageClass: ""  # use cluster default (local-path on k3s)

  # Evictable before app-critical pods under node memory pressure (Phase 12 constraint).
  priorityClassName: obs-background

  # Resource budget (Phase 12: ~2.5Gi available; obs total request ≤ 1.5Gi).
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Run as nobody (65534) — non-root.
  securityContext:
    runAsUser: 65534
    runAsNonRoot: true
    runAsGroup: 65534
    fsGroup: 65534

  service:
    type: ClusterIP
    servicePort: 80
    targetPort: 9090

# Scrape job configuration — chart's scrapeConfigs map (per-job enable/disable).
# Disable all default kubernetes_sd_configs jobs (Pitfall 6: no SA ClusterRole for SD;
# static_configs used instead for all targets in this single-node cluster).
scrapeConfigs:
  # Keep prometheus self-scrape.
  prometheus:
    enabled: true

  # Disable all default kubernetes_sd discovery jobs and pushgateway.
  kubernetes-api-servers:
    enabled: false
  kubernetes-nodes:
    enabled: false
  kubernetes-nodes-cadvisor:
    enabled: false
  kubernetes-service-endpoints:
    enabled: false
  kubernetes-service-endpoints-slow:
    enabled: false
  kubernetes-services:
    enabled: false
  kubernetes-pods:
    enabled: false
  kubernetes-pods-slow:
    enabled: false
  prometheus-pushgateway:
    enabled: false

  # kube-state-metrics — static ClusterIP (MET-02).
  kube-state-metrics:
    enabled: true
    static_configs:
      - targets:
          - kube-state-metrics.monitoring.svc:8080

  # node-exporter — static ClusterIP (MET-02).
  node-exporter:
    enabled: true
    static_configs:
      - targets:
          - node-exporter.monitoring.svc:9100

  # postgres-exporter — static ClusterIP (MET-03).
  postgres-exporter:
    enabled: true
    static_configs:
      - targets:
          - postgres-exporter.monitoring.svc:9187

  # RabbitMQ native prometheus plugin — cross-namespace FQDN (MET-04).
  # Phase 17 NetworkPolicy will add the explicit allow-prometheus-scrape rule.
  rabbitmq:
    enabled: true
    static_configs:
      - targets:
          - rabbitmq.solid-stats-staging.svc:15692

  # Loki metrics endpoint — fullnameOverride: loki → Service loki:3100 (15-01, LOG-01).
  # Scrapes loki_boltdb_shipper_compactor_running, loki_compactor_apply_retention_operation_total.
  loki:
    enabled: true
    static_configs:
      - targets:
          - loki.monitoring.svc:3100

  # Alloy metrics endpoint — fullnameOverride: alloy → Service alloy:12345 (15-02, LOG-02).
  # Scrapes loki_write_sent_entries_total (entries pushed from Alloy to Loki).
  alloy:
    enabled: true
    static_configs:
      - targets:
          - alloy.monitoring.svc:12345
