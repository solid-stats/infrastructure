---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: solid-stats
data:
  logs.json: |
    {
      "uid": "solid-stats-logs",
      "title": "Logs (Loki)",
      "tags": [
        "logs",
        "loki",
        "solid-stats"
      ],
      "schemaVersion": 39,
      "version": 3,
      "editable": true,
      "style": "dark",
      "graphTooltip": 0,
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "refresh": "30s",
      "timezone": "",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": "Loki",
            "query": "label_values(namespace)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "allValue": ".+",
            "current": {
              "selected": true,
              "text": [
                "solid-stats-staging"
              ],
              "value": [
                "solid-stats-staging"
              ]
            },
            "sort": 1,
            "hide": 0
          },
          {
            "name": "app",
            "label": "App",
            "type": "query",
            "datasource": "Loki",
            "query": "label_values({namespace=~\"$namespace\"}, app)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "allValue": ".+",
            "current": {
              "selected": true,
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            },
            "sort": 1,
            "hide": 0
          },
          {
            "name": "level",
            "label": "Min level",
            "type": "custom",
            "hide": 0,
            "description": "Ordered level filter using real level fields, not message substrings. server-2 (pino) gets a normalized `level` via structured metadata from Alloy; the other apps use Loki's query-time `detected_level`. The OR covers both so a single dropdown works across all apps.",
            "query": "All : , Warning+ :  | level=~\"warn|error|fatal|critical\" or detected_level=~\"warn|error|fatal|critical\" , Error+ :  | level=~\"error|fatal|critical\" or detected_level=~\"error|fatal|critical\"",
            "current": {
              "selected": true,
              "text": "All",
              "value": ""
            },
            "options": [
              {
                "selected": true,
                "text": "All",
                "value": ""
              },
              {
                "selected": false,
                "text": "Warning+",
                "value": " | level=~\"warn|error|fatal|critical\" or detected_level=~\"warn|error|fatal|critical\""
              },
              {
                "selected": false,
                "text": "Error+",
                "value": " | level=~\"error|fatal|critical\" or detected_level=~\"error|fatal|critical\""
              }
            ],
            "includeAll": false,
            "multi": false
          },
          {
            "name": "search",
            "label": "Search (regex)",
            "type": "textbox",
            "query": "",
            "current": {
              "text": "",
              "value": ""
            },
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log volume (lines/min by app)",
          "type": "timeseries",
          "datasource": "Loki",
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 50,
                "lineWidth": 0,
                "stacking": {
                  "mode": "normal"
                }
              },
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "sum"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": "Loki",
              "expr": "sum by (app) (count_over_time({namespace=~\"$namespace\", app=~\"$app\"} |~ \"(?i)$search\" $level [$__interval]))",
              "legendFormat": "{{app}}",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 3,
          "type": "row",
          "title": "Log lines \u2014 expand to view",
          "collapsed": true,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "panels": [
            {
              "id": 2,
              "title": "Logs",
              "type": "logs",
              "datasource": "Loki",
              "gridPos": {
                "h": 24,
                "w": 24,
                "x": 0,
                "y": 10
              },
              "options": {
                "showTime": true,
                "showLabels": false,
                "showCommonLabels": false,
                "wrapLogMessage": true,
                "prettifyLogMessage": true,
                "enableLogDetails": true,
                "dedupStrategy": "none",
                "sortOrder": "Descending"
              },
              "targets": [
                {
                  "refId": "A",
                  "datasource": "Loki",
                  "expr": "{namespace=~\"$namespace\", app=~\"$app\"} |~ \"(?i)$search\" $level",
                  "queryType": "range",
                  "maxLines": 500
                }
              ]
            }
          ]
        }
      ],
      "annotations": {
        "list": []
      }
    }
