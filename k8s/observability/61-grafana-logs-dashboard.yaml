---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: solid-stats
data:
  logs.json: |
    {
      "uid": "solid-stats-logs",
      "title": "Logs (Loki)",
      "tags": [
        "logs",
        "loki",
        "solid-stats"
      ],
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "style": "dark",
      "graphTooltip": 0,
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "refresh": "30s",
      "timezone": "",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": "Loki",
            "query": "label_values(namespace)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "allValue": ".+",
            "current": {
              "selected": true,
              "text": [
                "solid-stats-staging"
              ],
              "value": [
                "solid-stats-staging"
              ]
            },
            "sort": 1,
            "hide": 0
          },
          {
            "name": "app",
            "label": "App",
            "type": "query",
            "datasource": "Loki",
            "query": "label_values({namespace=~\"$namespace\"}, app)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "allValue": ".+",
            "current": {
              "selected": true,
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            },
            "sort": 1,
            "hide": 0
          },
          {
            "name": "search",
            "label": "Search (regex)",
            "type": "textbox",
            "query": "",
            "current": {
              "text": "",
              "value": ""
            },
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log volume (lines/min by app)",
          "type": "timeseries",
          "datasource": "Loki",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 40,
                "stacking": {
                  "mode": "normal"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": "Loki",
              "expr": "sum by (app) (count_over_time({namespace=~\"$namespace\", app=~\"$app\"} |~ \"(?i)$search\" [1m]))",
              "legendFormat": "{{app}}",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 2,
          "title": "Logs",
          "type": "logs",
          "datasource": "Loki",
          "gridPos": {
            "h": 22,
            "w": 24,
            "x": 0,
            "y": 8
          },
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": "Loki",
              "expr": "{namespace=~\"$namespace\", app=~\"$app\"} |~ \"(?i)$search\"",
              "queryType": "range"
            }
          ]
        }
      ],
      "annotations": {
        "list": []
      }
    }
