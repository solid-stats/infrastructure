name: Deploy staging infrastructure

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: infrastructure-staging-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  K8S_NAMESPACE: solid-stats-staging

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate manifests and scripts
        run: |
          set -euo pipefail
          test -d k8s/staging
          test -f scripts/ssh-tunnel-up.sh
          test -f scripts/kubeconfig-setup.sh
          test -f scripts/render-staging-secrets.py
          find k8s/staging -type f -name '*.yaml' | sort
          python3 scripts/validate-staging.py

  dry-run:
    name: Dry-run (server-side)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate]
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Open SSH tunnel
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: bash scripts/ssh-tunnel-up.sh

      - name: Setup kubeconfig
        env:
          K8S_TOKEN: ${{ secrets.K8S_TOKEN }}
          K8S_CA_CERT: ${{ secrets.K8S_CA_CERT }}
        run: bash scripts/kubeconfig-setup.sh

      - name: Dry-run kubectl apply (server-side)
        run: |
          set -euo pipefail
          # Exclude operator-bootstrapped, non-CI-managed manifests:
          # 00-namespace.yaml (cluster-scoped Namespace), 01-ci-rbac.yaml
          # (runtime ci-deployer RBAC), 01-obs-rbac.yaml (obs namespaces +
          # obs-ci-deployer RBAC), 02-priority-classes.yaml (cluster-scoped
          # PriorityClass), and 03-alloy-rbac.yaml (Alloy ClusterRole+CRB —
          # cluster-scoped; obs-ci-deployer cannot create ClusterRole). All five
          # are applied once by the operator and must not be overwritten by CI.
          find k8s/staging -maxdepth 1 -name '*.yaml' \
            ! -name '00-namespace.yaml' \
            ! -name '01-ci-rbac.yaml' \
            ! -name '01-obs-rbac.yaml' \
            ! -name '02-priority-classes.yaml' \
            ! -name '03-alloy-rbac.yaml' \
            | sort | sed 's/^/-f /' | \
            xargs kubectl apply -n "$K8S_NAMESPACE" --dry-run=server

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, dry-run]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Open SSH tunnel
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: bash scripts/ssh-tunnel-up.sh

      - name: Setup kubeconfig
        env:
          K8S_TOKEN: ${{ secrets.K8S_TOKEN }}
          K8S_CA_CERT: ${{ secrets.K8S_CA_CERT }}
        run: bash scripts/kubeconfig-setup.sh

      - name: Render and apply staging secrets
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          SERVER2_BOOTSTRAP_ADMIN_STEAM_ID: ${{ secrets.SERVER2_BOOTSTRAP_ADMIN_STEAM_ID }}
          REPLAYS_FETCHER_REPLAY_SOURCE_TRANSPORT: ${{ secrets.REPLAYS_FETCHER_REPLAY_SOURCE_TRANSPORT }}
          REPLAYS_FETCHER_REPLAY_SOURCE_URL: ${{ secrets.REPLAYS_FETCHER_REPLAY_SOURCE_URL }}
          REPLAYS_FETCHER_REPLAY_SOURCE_SSH_HOST: ${{ secrets.REPLAYS_FETCHER_REPLAY_SOURCE_SSH_HOST }}
          REPLAYS_FETCHER_REPLAY_SOURCE_SSH_COMMAND: ${{ secrets.REPLAYS_FETCHER_REPLAY_SOURCE_SSH_COMMAND }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          SENTRY_DSN_SERVER_2: ${{ secrets.SENTRY_DSN_SERVER_2 }}
          SENTRY_DSN_REPLAYS_FETCHER: ${{ secrets.SENTRY_DSN_REPLAYS_FETCHER }}
          SENTRY_DSN_REPLAY_PARSER_2: ${{ secrets.SENTRY_DSN_REPLAY_PARSER_2 }}
        run: |
          set -euo pipefail
          tmp_secrets=$(mktemp)
          trap 'rm -f "$tmp_secrets"' EXIT
          K8S_NAMESPACE="$K8S_NAMESPACE" python3 scripts/render-staging-secrets.py > "$tmp_secrets"
          kubectl apply -n "$K8S_NAMESPACE" -f "$tmp_secrets"

      - name: Apply staging manifests
        run: |
          set -euo pipefail
          # Exclude operator-bootstrapped, non-CI-managed manifests:
          # 00-namespace.yaml (cluster-scoped Namespace), 01-ci-rbac.yaml
          # (runtime ci-deployer RBAC), 01-obs-rbac.yaml (obs namespaces +
          # obs-ci-deployer RBAC), 02-priority-classes.yaml (cluster-scoped
          # PriorityClass), and 03-alloy-rbac.yaml (Alloy ClusterRole+CRB —
          # cluster-scoped; obs-ci-deployer cannot create ClusterRole). All five
          # are applied once by the operator and must not be overwritten by CI.
          find k8s/staging -maxdepth 1 -name '*.yaml' \
            ! -name '00-namespace.yaml' \
            ! -name '01-ci-rbac.yaml' \
            ! -name '01-obs-rbac.yaml' \
            ! -name '02-priority-classes.yaml' \
            ! -name '03-alloy-rbac.yaml' \
            | sort | sed 's/^/-f /' | \
            xargs kubectl apply -n "$K8S_NAMESPACE"

      - name: Verify rollouts
        run: |
          set -euo pipefail
          kubectl -n "$K8S_NAMESPACE" rollout status statefulset/postgres --timeout=300s
          kubectl -n "$K8S_NAMESPACE" rollout status statefulset/rabbitmq --timeout=300s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/server-2 --timeout=300s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/replay-parser-2 --timeout=300s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/web --timeout=300s
          echo "All workloads rolled out successfully"

      - name: Verify services and CronJobs
        run: |
          set -euo pipefail
          kubectl -n "$K8S_NAMESPACE" get service postgres rabbitmq server-2 web -o wide
          kubectl -n "$K8S_NAMESPACE" get cronjob replays-fetcher postgres-backup -o wide
